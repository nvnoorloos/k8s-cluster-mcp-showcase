# RBAC configuration for the k8s-cluster-mcp server.
# Grants read-only access to pods and pod metrics across all namespaces.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-cluster-mcp
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-cluster-mcp
rules:
  # Read pods across all namespaces (for the pod list dropdown)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Read pod metrics from metrics-server (for live CPU/memory usage)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-cluster-mcp
subjects:
  - kind: ServiceAccount
    name: k8s-cluster-mcp
    namespace: default
roleRef:
  kind: ClusterRole
  name: k8s-cluster-mcp
  apiGroup: rbac.authorization.k8s.io
